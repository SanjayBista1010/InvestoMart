<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestoMart</title>
    <style>
        #chatbot-toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav style="background: #667eea; color: white; padding: 15px;">
        <a href="/" style="color: white; text-decoration: none; font-weight: bold; margin-right: 20px;">Home</a>
        {% if user.is_authenticated %}
            <a href="/profile/" style="color: white; text-decoration: none; margin-right: 20px;">Profile</a>
            <a href="/logout/" style="color: white; text-decoration: none;">Logout</a>
        {% else %}
            <a href="/login/" style="color: white; text-decoration: none; margin-right: 20px;">Login</a>
            <a href="/signup/" style="color: white; text-decoration: none;">Sign Up</a>
        {% endif %}
    </nav>

    <!-- Main Content -->
    <div style="padding: 20px; min-height: 80vh;">
        {% block content %}{% endblock %}
    </div>

    <!-- Chatbot Container -->
    <div id="chatbot-container" style="display: none;"></div>
    
    <!-- Chatbot Toggle Button -->
    <button id="chatbot-toggle-btn" onclick="toggleChatbotWidget()">💬</button>

    <script>
        let chatbotLoaded = false;

        // Define chatbot functions GLOBALLY before loading widget
        window.addChatMessage = function(text, isUser) {
            const chatMessages = document.getElementById('chatMessages');
            if (!chatMessages) {
                console.error('chatMessages not found');
                return;
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
            
            if (isUser) {
                messageDiv.textContent = text;
            } else {
                const tableMarker = '|||TABLE|||';
                const markerIndex = text.indexOf(tableMarker);
                
                if (markerIndex !== -1) {
                    console.log('TABLE FOUND!');
                    const textPart = text.substring(0, markerIndex);
                    const tablePart = text.substring(markerIndex + tableMarker.length);
                    
                    const formattedText = textPart
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
                    
                    messageDiv.innerHTML = formattedText + tablePart;
                } else {
                    messageDiv.innerHTML = text
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
                }
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };

        window.sendChatMessage = function() {
            const input = document.getElementById('chatInput');
            if (!input) return;
            
            const message = input.value.trim();
            if (!message) return;
            
            window.addChatMessage(message, true);
            input.value = '';
            
            const loader = document.getElementById('loadingIndicator');
            if (loader) loader.style.display = 'block';
            
            fetch('/chatbot/api/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': window.getChatCSRFToken()
                },
                body: JSON.stringify({ message: message }),
                credentials: 'same-origin'
            })
            .then(resp => resp.json())
            .then(data => {
                if (loader) loader.style.display = 'none';
                console.log('Response:', data);
                window.addChatMessage(data.response || 'No response', false);
            })
            .catch(err => {
                if (loader) loader.style.display = 'none';
                console.error('Error:', err);
                window.addChatMessage('Error occurred', false);
            });
        };

        window.quickChatQuery = function(query) {
            console.log('Quick query:', query);
            const input = document.getElementById('chatInput');
            if (input) {
                input.value = query;
                window.sendChatMessage();
            }
        };

        window.closeChatbot = function() {
            const container = document.getElementById('chatbot-container');
            if (container) container.style.display = 'none';
        };

        window.getChatCSRFToken = function() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [key, value] = cookie.trim().split('=');
                if (key === 'csrftoken') return decodeURIComponent(value);
            }
            return '';
        };

        function toggleChatbotWidget() {
            const container = document.getElementById('chatbot-container');
            if (!container) {
                console.error('Chatbot container not found');
                return;
            }
            
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
                
                if (!chatbotLoaded) {
                    console.log('Loading chatbot widget...');
                    fetch('/chatbot/widget/')
                        .then(response => response.text())
                        .then(html => {
                            container.innerHTML = html;
                            chatbotLoaded = true;
                            console.log('Widget loaded successfully');
                            
                            // Attach enter key listener
                            const input = document.getElementById('chatInput');
                            if (input) {
                                input.addEventListener('keypress', function(e) {
                                    if (e.key === 'Enter') {
                                        e.preventDefault();
                                        window.sendChatMessage();
                                    }
                                });
                            }
                            
                            // Show welcome message
                            setTimeout(() => {
                                window.addChatMessage('Hello! Ask me about your portfolio.', false);
                            }, 300);
                        })
                        .catch(error => {
                            console.error('Failed to load widget:', error);
                            container.innerHTML = '<div style="padding:20px;color:red;">Failed to load chatbot</div>';
                        });
                }
            } else {
                container.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, chatbot ready');
        });
    </script>
</body>
</html>
